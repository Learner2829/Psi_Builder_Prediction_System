{% extends "base.html" %}

{% block content %}

<style>
    /* ── TOOLBAR ── */
    .toolbar {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
        background: var(--srf);
        padding: 12px;
        border-radius: var(--rl);
        border: 1px solid var(--bdr);
        align-items: center;
        flex-wrap: wrap;
        justify-content: space-between;
        transition: background .3s, border-color .3s;
    }

    .idx-group {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
    }

    .idx-btn {
        padding: 8px 12px;
        background: var(--evl);
        border: 1px solid var(--bdr);
        color: var(--t2);
        cursor: pointer;
        border-radius: var(--r);
        font-weight: 600;
        font-size: 13px;
        min-width: 72px;
        text-align: center;
        transition: var(--tx);
    }

    .idx-btn:hover {
        background: var(--card);
        color: var(--t1);
    }

    .idx-btn.active {
        background: var(--blue);
        color: #fff;
        border-color: var(--blue);
    }

    .market-stats {
        display: flex;
        gap: 20px;
        margin-left: auto;
        align-items: center;
    }

    .stat-item {
        font-size: 14px;
        font-weight: 600;
        color: var(--t2);
    }

    .stat-val {
        color: var(--gold);
        font-size: 16px;
        margin-left: 5px;
    }

    .vix-val {
        color: var(--red);
        font-size: 16px;
        margin-left: 5px;
    }

    /* ── CHAIN TABLE ── */
    .chain-wrapper {
        border: 1px solid var(--bdr);
        border-radius: var(--rl);
        background: var(--srf);
        overflow: hidden;
        width: 100%;
        position: relative;
        transition: background .3s, border-color .3s;
    }

    .chain-scroll {
        width: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }

    .grid-row {
        display: grid;
        grid-template-columns: 35px 45px 0.8fr 0.8fr 0.8fr 0.8fr 90px 60px 0.8fr 0.8fr 0.8fr 0.8fr 45px 35px;
        align-items: center;
        border-bottom: 1px solid var(--bdr2);
        min-width: 1100px;
    }

    .header-row {
        background: var(--evl);
        font-weight: 700;
        color: var(--t2);
        font-size: 10px;
        text-transform: uppercase;
        padding: 11px 0;
        position: sticky;
        top: 0;
        z-index: 10;
        letter-spacing: .8px;
        border-bottom: 2px solid var(--bdr);
    }

    .data-row {
        font-size: 12px;
        padding: 6px 0;
        color: var(--t1);
        transition: background .15s;
    }

    .data-row:hover {
        background: var(--evl);
    }

    .col {
        text-align: center;
        padding: 0 4px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    /* Strike & ATM */
    .strike {
        background: var(--bg);
        color: var(--gold);
        font-weight: 700;
        padding: 5px 4px;
        border-radius: var(--r);
        border: 1px solid var(--bdr);
    }

    .atm {
        background: rgba(245, 166, 35, .06);
        border-left: 2px solid var(--gold);
        border-right: 2px solid var(--gold);
    }

    .pcr-val {
        font-weight: 700;
    }

    .ltp-text {
        font-weight: 700;
        color: var(--t1);
    }

    /* Buttons */
    .btn-trade {
        background: var(--blue);
        color: #fff;
        border: none;
        padding: 5px 0;
        width: 100%;
        border-radius: var(--r);
        font-weight: 700;
        cursor: pointer;
        transition: var(--tx);
    }

    .btn-trade:hover {
        background: var(--blueh);
    }

    .btn-greek {
        background: var(--purple);
        color: #fff;
        border: none;
        padding: 5px 0;
        width: 100%;
        border-radius: var(--r);
        font-weight: 700;
        cursor: pointer;
        transition: var(--tx);
    }

    .btn-greek:hover {
        opacity: .85;
    }

    /* ── MODALS ── */
    .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, .75);
        backdrop-filter: blur(4px);
        z-index: 200;
        justify-content: center;
        align-items: center;
    }

    .modal {
        background: var(--srf);
        padding: 22px;
        border-radius: var(--rl);
        width: 90%;
        max-width: 360px;
        border: 1px solid var(--bdr);
        box-shadow: var(--sh3);
        transition: background .3s;
    }

    .trade-type-switch {
        display: flex;
        margin-bottom: 18px;
        border-radius: var(--r);
        overflow: hidden;
        border: 1px solid var(--bdr);
    }

    .type-btn {
        flex: 1;
        padding: 12px;
        border: none;
        font-weight: 700;
        background: var(--evl);
        color: var(--t2);
        cursor: pointer;
        transition: var(--tx);
    }

    .type-btn.active-buy {
        background: var(--green);
        color: #000;
    }

    .type-btn.active-sell {
        background: var(--red);
        color: #fff;
    }

    .form-group label {
        display: block;
        margin-bottom: 6px;
        color: var(--t2);
        font-size: 12px;
        font-weight: 500;
    }

    .form-group input {
        width: 100%;
        padding: 11px 12px;
        background: var(--inp);
        border: 1px solid var(--bdr);
        color: var(--t1);
        border-radius: var(--r);
        box-sizing: border-box;
        font-size: 15px;
        transition: border-color .2s;
    }

    .form-group input:focus {
        outline: none;
        border-color: var(--blue);
    }

    /* Greeks modal */
    .greek-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 15px;
    }

    .greek-box {
        background: var(--evl);
        padding: 12px;
        border-radius: var(--r);
        text-align: center;
        border: 1px solid var(--bdr);
    }

    .greek-label {
        font-size: 10px;
        color: var(--t2);
        text-transform: uppercase;
        letter-spacing: .5px;
    }

    .greek-val {
        font-size: 16px;
        font-weight: 700;
        color: var(--t1);
        margin-top: 4px;
    }

    .greek-iv {
        grid-column: span 2;
        border-color: var(--sky);
        background: var(--bbg);
    }

    /* ── EXPIRY FILTER ── */
    .expiry-filter {
        display: flex;
        gap: 3px;
        align-items: center;
        background: var(--bg);
        border: 1px solid var(--bdr);
        border-radius: var(--r);
        padding: 3px;
    }

    .ef-btn {
        padding: 5px 10px;
        background: transparent;
        border: none;
        color: var(--t3);
        cursor: pointer;
        border-radius: 4px;
        font-weight: 700;
        font-size: 11px;
        letter-spacing: .5px;
        text-transform: uppercase;
        transition: .15s;
    }

    .ef-btn:hover {
        color: var(--t1);
        background: var(--evl);
    }

    .ef-btn.active-all {
        background: var(--evl);
        color: var(--t1);
    }

    .ef-btn.active-weekly {
        background: var(--blue);
        color: #fff;
    }

    .ef-btn.active-monthly {
        background: var(--green);
        color: #000;
    }

    @media (max-width: 600px) {
        .market-stats {
            width: 100%;
            justify-content: space-between;
            margin-top: 10px;
            border-top: 1px solid var(--bdr);
            padding-top: 10px;
            margin-left: 0;
        }

        .idx-group {
            width: 100%;
            margin-bottom: 10px;
        }

        .idx-btn {
            flex: 1;
        }

        select {
            width: 100%;
        }

        .expiry-filter {
            width: 100%;
            justify-content: center;
        }
    }
</style>

<div class="toolbar">
    <div class="idx-group">
        <button class="idx-btn active" onclick="setIndex('NIFTY')">NIFTY</button>
        <button class="idx-btn" onclick="setIndex('BANKNIFTY')">BANK</button>
        <button class="idx-btn" onclick="setIndex('FINNIFTY')">FIN</button>
        <button class="idx-btn" onclick="setIndex('MIDCPNIFTY')">MIDCP</button>
        <button class="idx-btn" onclick="setIndex('SENSEX')">SENSEX</button>
    </div>

    <!-- EXPIRY TYPE FILTER -->
    <div class="expiry-filter">
        <button class="ef-btn active-all" data-filter="all" onclick="filterExpiry('all',    event)">ALL</button>
        <button class="ef-btn" data-filter="weekly" onclick="filterExpiry('weekly',  event)">W</button>
        <button class="ef-btn" data-filter="monthly" onclick="filterExpiry('monthly', event)">M</button>
    </div>

    <select id="expirySelect" onchange="reloadChain(lastSpot)"></select>

    <div class="market-stats">
        <div class="stat-item">VIX: <span id="vix" class="vix-val">...</span></div>
        <div class="stat-item">SPOT: <span id="spot" class="stat-val">...</span></div>
    </div>
</div>

<div class="chain-wrapper">
    <div class="chain-scroll">
        <div class="grid-row header-row">
            <div class="col" title="Greeks">G</div>
            <div class="col">Trade</div>
            <div class="col">Vol</div>
            <div class="col" style="color:#a78bfa">OI</div>
            <div class="col">ATP</div>
            <div class="col">LTP</div>
            <div class="col" style="color:#facc15">Strike</div>
            <div class="col">PCR</div>
            <div class="col">LTP</div>
            <div class="col">ATP</div>
            <div class="col" style="color:#a78bfa">OI</div>
            <div class="col">Vol</div>
            <div class="col">Trade</div>
            <div class="col" title="Greeks">G</div>
        </div>
        <div id="chainRows"></div>
    </div>
</div>

<div id="tradeModal" class="modal-overlay">
    <div class="modal">
        <h3 style="margin-top:0; text-align:center; font-size: 18px;">Place Order</h3>
        <p id="modalSymbol"
            style="text-align:center; color:#38bdf8; font-weight:bold; margin-bottom:15px; font-size:14px;"></p>

        <div class="trade-type-switch">
            <button id="btnBuy" class="type-btn active-buy" onclick="setTradeType('BUY')">BUY</button>
            <button id="btnSell" class="type-btn" onclick="setTradeType('SELL')">SELL</button>
        </div>

        <p style="font-size:13px; color:#94a3b8; text-align:center; margin-bottom:15px;">
            LTP: <span id="modalLtp" style="color:var(--t1); font-weight:bold; margin-right: 15px;">0.00</span>
            ATP: <span id="modalAtp" style="color:#facc15; font-weight:bold;">0.00</span>
        </p>

        <input type="hidden" id="modalToken">
        <input type="hidden" id="tradeType" value="BUY">

        <div class="form-group"><label>Quantity</label><input type="number" id="modalQty" oninput="calcMargin()"></div>

        <div class="form-group"><label>Target % <span style="color:#64748b; font-weight:normal;">← type % to auto-fill
                    ₹</span></label><input type="number" id="modalTargetPct" placeholder="e.g., 10"
                oninput="autoCalculateRiskReward()"></div>

        <div style="display:flex; gap:10px;">
            <div class="form-group" style="flex:1"><label>SL <span
                        style="color:#64748b; font-weight:normal;font-size:10px;">(₹)</span></label><input type="number"
                    id="modalSL" placeholder="Opt"></div>
            <div class="form-group" style="flex:1"><label>Target <span
                        style="color:#64748b; font-weight:normal;font-size:10px;">← type ₹ to auto-fill
                        %</span></label><input type="number" id="modalTarget" placeholder="Opt"
                    oninput="reverseCalculateRiskReward()"></div>
        </div>

        <div style="text-align:right; font-size:12px; color:#94a3b8; margin-bottom:15px;">
            Margin: <span id="marginReq" style="color:#facc15; font-weight:bold;">₹0</span>
        </div>

        <div style="display:flex; gap:10px;">
            <button
                style="flex:1; background:#475569; color:white; padding:12px; border:none; border-radius:6px; font-weight:bold; cursor:pointer;"
                onclick="closeModal()">Cancel</button>
            <button id="btnConfirm"
                style="flex:1; background:#22c55e; color:black; font-weight:bold; padding:12px; border:none; border-radius:6px; cursor:pointer;"
                onclick="confirmOrder()">CONFIRM</button>
        </div>
        <p style="text-align:center; font-size:10px; color:#64748b; margin-top:10px;">*Brokerage & Taxes apply on
            execution</p>
    </div>
</div>

<div id="greeksModal" class="modal-overlay">
    <div class="modal">
        <h3 style="margin-top:0; text-align:center; color:#a78bfa; font-size:18px;">Option Greeks</h3>
        <p id="greekSymbol"
            style="text-align:center; color:white; font-size:13px; margin-bottom:15px; border-bottom:1px solid #334155; padding-bottom:10px;">
            ...</p>

        <div class="greek-grid">
            <div class="greek-box">
                <div class="greek-label">Delta (Δ)</div>
                <div class="greek-val" id="g-delta">-</div>
            </div>
            <div class="greek-box">
                <div class="greek-label">Theta (Θ)</div>
                <div class="greek-val" id="g-theta">-</div>
            </div>
            <div class="greek-box">
                <div class="greek-label">Gamma (Γ)</div>
                <div class="greek-val" id="g-gamma">-</div>
            </div>
            <div class="greek-box">
                <div class="greek-label">Vega (v)</div>
                <div class="greek-val" id="g-vega">-</div>
            </div>

                <div class="greek-label">IV</div>
                <div class="greek-val" id="g-iv">-</div>
            </div>
        </div>

        <div style="margin-top:20px; text-align:center">
            <button
                style="background:#475569; color:white; padding:10px 30px; border:none; border-radius:6px; font-weight:bold; cursor:pointer;"
                onclick="closeGreeks()">Close</button>
        </div>
    </div>
</div>

<script>
    // MATCH THESE TOKENS WITH APP.PY
    const INDEX_MAP = {
        "NIFTY": { token: "99926000", lot: 65 },
        "BANKNIFTY": { token: "99926009", lot: 30 },
        "FINNIFTY": { token: "99926037", lot: 40 },
        "MIDCPNIFTY": { token: "99926074", lot: 75 },
        "SENSEX": { token: "99919000", lot: 10 }
    };
    const VIX_TOKEN = "99926017";

    let currentIndex = "NIFTY";
    let activeTokens = [];
    let streamInterval = null;
    let currentATM = 0, lastSpot = 0;
    let strikeTokens = {};
    let allExpiries = [];           // Full list: [{date, type}, ...]
    let currentExpiryFilter = 'all'; // Active filter

    window.onload = () => { setIndex('NIFTY'); };

    // Populate the <select> based on the active filter
    function populateExpirySelect(preserveSelection = false) {
        const sel = document.getElementById('expirySelect');
        const prevVal = preserveSelection ? sel.value : null;

        const filtered = currentExpiryFilter === 'all'
            ? allExpiries
            : allExpiries.filter(e => e.type === currentExpiryFilter);

        sel.innerHTML = '';
        filtered.forEach(e => {
            const label = e.type === 'weekly' ? `${e.date} (W)`
                : e.type === 'yearly' ? `${e.date} (Y)`
                    : e.date;
            sel.add(new Option(label, e.date));
        });

        // Restore previous value or default to first
        if (prevVal && [...sel.options].some(o => o.value === prevVal)) {
            sel.value = prevVal;
        } else if (sel.options.length > 0) {
            sel.value = sel.options[0].value;
        }
    }

    // Switch the expiry type filter
    function filterExpiry(type, evt) {
        currentExpiryFilter = type;
        // Update button active classes
        document.querySelectorAll('.ef-btn').forEach(b => {
            b.className = 'ef-btn'; // reset
        });
        evt.target.classList.add(`active-${type}`);

        // Repopulate & reload chain for first visible expiry
        populateExpirySelect(false);
        if (document.getElementById('expirySelect').options.length > 0) {
            reloadChain(lastSpot);
        }
    }

    async function setIndex(idx) {
        currentIndex = idx;
        document.querySelectorAll('.idx-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');

        // Reset filter to ALL when switching indices
        currentExpiryFilter = 'all';
        document.querySelectorAll('.ef-btn').forEach(b => b.className = 'ef-btn');
        document.querySelector('.ef-btn[data-filter="all"]').classList.add('active-all');

        document.getElementById('chainRows').innerHTML = '<div style="padding:20px; text-align:center; color:#94a3b8">Loading Chain...</div>';

        const res = await fetch('/api/expiries', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ index: currentIndex }) });
        allExpiries = await res.json(); // [{date, type}, ...]

        populateExpirySelect(false);
        if (allExpiries.length > 0) { startFeed(); }
    }

    async function startFeed() {
        if (streamInterval) clearInterval(streamInterval);
        const spotToken = INDEX_MAP[currentIndex].token;
        await fetch('/api/subscribe', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tokens: [spotToken, VIX_TOKEN] }) });
        streamInterval = setInterval(updateUI, 1000);
    }

    function formatLakhs(val) {
        if (!val || val === 0) return '0';
        if (val >= 100000) return (val / 100000).toFixed(2) + ' L';
        if (val >= 1000) return (val / 1000).toFixed(1) + ' k';
        return val;
    }

    async function updateUI() {
        const res = await fetch('/api/market_data');
        const feed = await res.json();
        const spotToken = INDEX_MAP[currentIndex].token;

        if (feed[spotToken]) {
            const spot = feed[spotToken].ltp;
            lastSpot = spot;
            document.getElementById('spot').innerText = spot.toFixed(2);

            let step = 50;
            if (['SENSEX', 'BANKEX', 'BANKNIFTY'].includes(currentIndex)) step = 100;
            if (currentIndex === 'MIDCPNIFTY') step = 25;

            const newATM = Math.round(spot / step) * step;
            if (currentATM === 0 || newATM !== currentATM) reloadChain(spot);
        }

        if (feed[VIX_TOKEN]) {
            document.getElementById('vix').innerText = feed[VIX_TOKEN].ltp.toFixed(2);
        }

        for (const [t, d] of Object.entries(feed)) {
            // Update LTP with color
            const ltpEl = document.getElementById(`ltp-${t}`);
            if (ltpEl) {
                ltpEl.innerText = d.ltp.toFixed(2);
                if (d.pct.includes('+')) ltpEl.style.color = "#4ade80";
                else ltpEl.style.color = "#f87171";
            }

            // Update Volume (Show 0 if 0)
            const volEl = document.getElementById(`vol-${t}`);
            if (volEl) volEl.innerText = d.vol > 0 ? formatLakhs(d.vol) : "0";

            // Update OI (Show 0 if 0)
            const oiEl = document.getElementById(`oi-${t}`);
            if (oiEl) oiEl.innerText = d.oi > 0 ? formatLakhs(d.oi) : "0";

            // Update ATP
            const atpEl = document.getElementById(`atp-${t}`);
            if (atpEl) atpEl.innerText = d.atp > 0 ? d.atp.toFixed(2) : "0.00";

            if (document.getElementById('tradeModal').style.display === 'flex' && document.getElementById('modalToken').value === t) {
                document.getElementById('modalLtp').innerText = d.ltp.toFixed(2);
                document.getElementById('modalAtp').innerText = d.atp > 0 ? d.atp.toFixed(2) : "0.00";
                calcMargin();
            }
        }

        for (const [strike, tokens] of Object.entries(strikeTokens)) {
            const ceData = feed[tokens.CE];
            const peData = feed[tokens.PE];
            if (ceData && peData) {
                const ceOI = ceData.oi || 0;
                const peOI = peData.oi || 0;
                let pcr = "-";
                if (ceOI > 0) pcr = (peOI / ceOI).toFixed(2);
                const pcrEl = document.getElementById(`pcr-${strike}`);
                if (pcrEl) {
                    pcrEl.innerText = pcr;
                    pcrEl.style.color = pcr > 1 ? "#4ade80" : (pcr < 0.6 ? "#f87171" : "#cbd5e1");
                }
            }
        }
    }

    async function reloadChain(spot) {
        const expiry = document.getElementById('expirySelect').value;
        const res = await fetch('/api/option_chain', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ expiry: expiry, spot: spot, index: currentIndex })
        });
        const data = await res.json();
        currentATM = data.atm;
        const container = document.getElementById('chainRows');
        container.innerHTML = '';
        activeTokens = [INDEX_MAP[currentIndex].token];
        strikeTokens = {};

        data.chain.forEach(row => {
            let ceBtn = '-', ceVol = '-', ceOi = '-', ceAtp = '-', ceLtp = '-', ceGreeks = '-';
            let peBtn = '-', peVol = '-', peOi = '-', peAtp = '-', peLtp = '-', peGreeks = '-';

            if (row.CE) {
                activeTokens.push(row.CE.token);
                const gD = row.CE;
                ceGreeks = `<button class="btn-greek" onclick="openGreeks('${gD.symbol}', '${gD.delta}', '${gD.theta}', '${gD.gamma}', '${gD.vega}', '${gD.iv}')">G</button>`;
                ceBtn = `<button class="btn-trade" onclick="openModal('${row.CE.token}', '${row.CE.symbol}')">T</button>`;
                ceVol = `<span id="vol-${row.CE.token}">...</span>`;
                ceOi = `<span id="oi-${row.CE.token}" class="oi-text">...</span>`;
                ceAtp = `<span id="atp-${row.CE.token}" style="color:var(--t1)">...</span>`;
                ceLtp = `<span id="ltp-${row.CE.token}" class="ltp-text">...</span>`;
            }

            if (row.PE) {
                activeTokens.push(row.PE.token);
                const gD = row.PE;
                peGreeks = `<button class="btn-greek" onclick="openGreeks('${gD.symbol}', '${gD.delta}', '${gD.theta}', '${gD.gamma}', '${gD.vega}', '${gD.iv}')">G</button>`;
                peBtn = `<button class="btn-trade" onclick="openModal('${row.PE.token}', '${row.PE.symbol}')">T</button>`;
                peVol = `<span id="vol-${row.PE.token}">...</span>`;
                peOi = `<span id="oi-${row.PE.token}" class="oi-text">...</span>`;
                peAtp = `<span id="atp-${row.PE.token}" style="color:var(--t1)">...</span>`;
                peLtp = `<span id="ltp-${row.PE.token}" class="ltp-text">...</span>`;
            }

            if (row.CE && row.PE) strikeTokens[row.strike] = { CE: row.CE.token, PE: row.PE.token };

            const div = document.createElement('div');
            div.className = `grid-row data-row ${row.strike === data.atm ? 'atm' : ''}`;
            div.innerHTML = `
                <div class="col">${ceGreeks}</div>
                <div class="col">${ceBtn}</div>
                <div class="col">${ceVol}</div>
                <div class="col">${ceOi}</div>
                <div class="col">${ceAtp}</div>
                <div class="col">${ceLtp}</div>
                <div class="col strike">${row.strike}</div>
                <div class="col pcr-val" id="pcr-${row.strike}">...</div>
                <div class="col">${peLtp}</div>
                <div class="col">${peAtp}</div>
                <div class="col">${peOi}</div>
                <div class="col">${peVol}</div>
                <div class="col">${peBtn}</div>
                <div class="col">${peGreeks}</div>
            `;
            container.appendChild(div);
        });

        fetch('/api/subscribe', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tokens: activeTokens }) });
    }

    function openModal(token, symbol) {
        document.getElementById('modalToken').value = token;
        document.getElementById('modalSymbol').innerText = symbol;
        document.getElementById('modalLtp').innerText = document.getElementById(`ltp-${token}`)?.innerText || "0.00";
        document.getElementById('modalAtp').innerText = document.getElementById(`atp-${token}`)?.innerText || "0.00";
        document.getElementById('modalTargetPct').value = "";
        document.getElementById('modalQty').value = INDEX_MAP[currentIndex].lot;
        document.getElementById('modalSL').value = "";
        document.getElementById('modalTarget').value = "";
        setTradeType('BUY');
        document.getElementById('tradeModal').style.display = 'flex';
        calcMargin();
    }

    function setTradeType(type) {
        document.getElementById('tradeType').value = type;
        const btnConfirm = document.getElementById('btnConfirm');
        const btnBuy = document.getElementById('btnBuy');
        const btnSell = document.getElementById('btnSell');
        if (type === 'BUY') {
            btnBuy.classList.add('active-buy');
            btnSell.classList.remove('active-sell');
            btnConfirm.innerText = 'CONFIRM BUY';
            btnConfirm.style.background = '#22c55e';
        } else {
            btnSell.classList.add('active-sell');
            btnBuy.classList.remove('active-buy');
            btnConfirm.innerText = 'CONFIRM SELL';
            btnConfirm.style.background = '#ef4444';
        }

        autoCalculateRiskReward();
        calcMargin();
    }

    // FLAG to prevent cross-trigger infinite loops between the two calculators
    let _rrCalcLock = false;

    // FORWARD: Enter % → auto-fill Target ₹ and SL ₹ (1:2 R:R)
    function autoCalculateRiskReward() {
        if (_rrCalcLock) return;
        const pctInput = document.getElementById('modalTargetPct').value;
        const pct = parseFloat(pctInput);

        const basePrice = parseFloat(document.getElementById('modalLtp').innerText);
        const type = document.getElementById('tradeType').value;

        if (isNaN(pct) || isNaN(basePrice) || basePrice <= 0 || pct <= 0 || pctInput.trim() === '') {
            return;
        }

        const targetDelta = basePrice * (pct / 100);
        const slDelta = targetDelta / 2; // 1:2 Risk-Reward

        let targetPrice, slPrice;

        if (type === 'BUY') {
            targetPrice = basePrice + targetDelta;
            slPrice = Math.max(0.05, basePrice - slDelta);
        } else {
            targetPrice = Math.max(0.05, basePrice - targetDelta);
            slPrice = basePrice + slDelta;
        }

        _rrCalcLock = true;
        document.getElementById('modalTarget').value = targetPrice.toFixed(2);
        document.getElementById('modalSL').value = slPrice.toFixed(2);
        _rrCalcLock = false;
    }

    // REVERSE: Enter Target ₹ → back-calculate % and auto-fill SL ₹ (1:2 R:R)
    function reverseCalculateRiskReward() {
        if (_rrCalcLock) return;
        const targetInput = document.getElementById('modalTarget').value;
        const targetPrice = parseFloat(targetInput);

        const basePrice = parseFloat(document.getElementById('modalLtp').innerText);
        const type = document.getElementById('tradeType').value;

        if (isNaN(targetPrice) || isNaN(basePrice) || basePrice <= 0 || targetInput.trim() === '') {
            return;
        }

        const targetDelta = Math.abs(targetPrice - basePrice);

        // Validate direction: BUY target must be above LTP, SELL target must be below
        if (type === 'BUY' && targetPrice <= basePrice) return;
        if (type === 'SELL' && targetPrice >= basePrice) return;

        const pct = (targetDelta / basePrice) * 100;
        const slDelta = targetDelta / 2; // 1:2 Risk-Reward

        let slPrice;
        if (type === 'BUY') {
            slPrice = Math.max(0.05, basePrice - slDelta);
        } else {
            slPrice = basePrice + slDelta;
        }

        _rrCalcLock = true;
        document.getElementById('modalTargetPct').value = pct.toFixed(2);
        document.getElementById('modalSL').value = slPrice.toFixed(2);
        _rrCalcLock = false;
    }

    function calcMargin() {
        const qty = document.getElementById('modalQty').value;
        const ltp = parseFloat(document.getElementById('modalLtp').innerText);
        const type = document.getElementById('tradeType').value;
        let margin = 0;
        // BACKEND COMPATIBILITY: Sell Margin is calculated as 2000 * Qty in backend
        if (type === 'BUY') margin = ltp * qty;
        else margin = qty * 2000;
        document.getElementById('marginReq').innerText = "₹" + margin.toLocaleString('en-IN', { maximumFractionDigits: 0 });
    }

    function closeModal() { document.getElementById('tradeModal').style.display = 'none'; }

    async function confirmOrder() {
        const token = document.getElementById('modalToken').value;
        const symbol = document.getElementById('modalSymbol').innerText;
        const qty = document.getElementById('modalQty').value;
        const sl = document.getElementById('modalSL').value;
        const target = document.getElementById('modalTarget').value;
        const type = document.getElementById('tradeType').value;

        const res = await fetch('/api/orders/place', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, symbol, qty, sl, target, type })
        });
        const data = await res.json();

        // FIXED: Sending the user back to the dashboard upon successful order execution
        if (data.status === 'ok') {
            closeModal();
            window.location.href = "/dashboard";
        }
        else {
            alert(data.msg);
        }
    }

    function openGreeks(symbol, delta, theta, gamma, vega, iv) {
        document.getElementById('greekSymbol').innerText = symbol;
        const safeVal = (val) => (val && val !== 'undefined' && val !== 'null') ? parseFloat(val).toFixed(4) : '-';
        document.getElementById('g-delta').innerText = safeVal(delta);
        document.getElementById('g-theta').innerText = safeVal(theta);
        document.getElementById('g-gamma').innerText = safeVal(gamma);
        document.getElementById('g-vega').innerText = safeVal(vega);
        const ivVal = (iv && iv !== 'undefined' && iv !== 'null') ? parseFloat(iv).toFixed(2) + '%' : '-';
        document.getElementById('g-iv').innerText = ivVal;
        document.getElementById('greeksModal').style.display = 'flex';
    }

    function closeGreeks() { document.getElementById('greeksModal').style.display = 'none'; }
</script>

{% endblock %}
