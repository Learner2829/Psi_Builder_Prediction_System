{% extends "base.html" %}
{% block content %}

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
    .prediction-container {
        display: grid;
        grid-template-columns: 380px 1fr;
        gap: 20px; margin-top: 10px;
    }

    .glass-card {
        background: var(--srf);
        border: 1px solid var(--bdr);
        border-radius: var(--rl);
        padding: 20px; box-shadow: var(--sh2);
        transition: background .3s, border-color .3s;
    }

    .pred-section-title {
        color: var(--gold); font-size: 12px;
        text-transform: uppercase; letter-spacing: 1px;
        margin-bottom: 18px; font-weight: 700;
    }

    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
        text-align: left; font-size: 10px; color: var(--t2);
        padding: 10px; border-bottom: 1px solid var(--bdr);
        text-transform: uppercase; letter-spacing: .8px;
    }
    .data-table td {
        padding: 12px 10px; border-bottom: 1px solid var(--bdr2);
        font-size: 13px; cursor: pointer; color: var(--t1);
    }
    .data-table tr:hover td { background: var(--evl); }

    .badge {
        background: var(--blue); color: #fff;
        padding: 3px 8px; border-radius: 4px;
        font-weight: 700; font-size: 11px;
    }

    .math-info {
        margin-top: 18px; background: var(--evl);
        border-radius: var(--r); padding: 14px;
        border: 1px dashed var(--bdr);
        font-family: 'Consolas', 'Courier New', monospace;
        font-size: 12px; min-height: 100px; color: var(--t1);
    }
    .math-line { display: flex; justify-content: space-between; margin-bottom: 8px; }

    .chart-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }

    .custom-select {
        background: var(--inp); color: var(--t1);
        border: 1px solid var(--bdr); padding: 6px 12px;
        border-radius: var(--r); outline: none; transition: var(--tx);
    }
    .custom-select:focus { border-color: var(--blue); }

    .refresh-btn {
        background: var(--blue); color: #fff; border: none;
        padding: 8px 18px; border-radius: var(--r);
        cursor: pointer; margin-bottom: 18px;
        font-weight: 700; transition: var(--tx);
    }
    .refresh-btn:hover { background: var(--blueh); }

    #loading-bar {
        position: fixed; top: 0; left: 0;
        width: 0; height: 3px;
        background: var(--gold); z-index: 2000;
        transition: width .3s ease;
    }

    @media (max-width: 900px) { .prediction-container { grid-template-columns: 1fr; } }
</style>

<div id="loading-bar"></div>

<button class="refresh-btn" id="refreshBtn">🔄 Refresh Predictions</button>

<div class="prediction-container">
    <div class="glass-card">
        <div class="pred-section-title">INDEX PROJECTIONS</div>

        <table class="data-table">
            <thead>
                <tr>
                    <th>INDEX</th>
                    <th>LTP</th>
                    <th>PREDICT</th>
                    <th>TREND</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="4" style="text-align:center; color: var(--text-dim); padding:20px;">
                        Loading data...
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="math-info" id="mathDetails">
            <div id="mathStatus" style="text-align:center; color: var(--text-dim); padding-top: 30px;">
                Ready to Analyze
            </div>
        </div>
    </div>

    <div class="glass-card">
        <div class="chart-top">
            <div class="pred-section-title" style="margin-bottom:0">TECHNICAL TREND PATH</div>
            <select id="indexSelector" class="custom-select"></select>
        </div>

        <div style="height: 450px; width: 100%; position: relative;">
            <canvas id="mainChart"></canvas>
        </div>
    </div>
</div>

<script>
    let rawData = {};
    let chartObj = null;

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('refreshBtn').addEventListener('click', fetchPredictions);
        document.getElementById('indexSelector').addEventListener('change', syncSelection);
        fetchPredictions();
    });

    async function fetchPredictions() {
        const bar = document.getElementById('loading-bar');
        const status = document.getElementById('mathStatus');
        const tbody = document.getElementById('tableBody');
        const selector = document.getElementById('indexSelector');

        bar.style.width = '30%';
        status.innerText = 'Connecting to server...';

        try {
            const response = await fetch('/api/predict_indices');

            if (!response.ok) {
                throw new Error(`HTTP error! Status: ${response.status}`);
            }

            const data = await response.json();
            bar.style.width = '100%';

            tbody.innerHTML = '';
            selector.innerHTML = '';
            rawData = {};

            const predictions = data.predictions || [];

            if (!predictions.length) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" style="text-align:center; color: var(--text-dim); padding:20px;">
                            No prediction data available
                        </td>
                    </tr>
                `;
                status.innerText = 'No data available';
                return;
            }

            predictions.forEach((item, index) => {
                const symbol = item.symbol || `INDEX-${index + 1}`;

                const currentPrice = parseFloat(item.current_price ?? item.ltp ?? 0);
                const predictedPrice = parseFloat(item.predicted_price ?? 0);
                const slope = parseFloat(item.slope ?? item.m ?? 0);
                const intercept = parseFloat(item.intercept ?? item.c ?? currentPrice);
                const rSquared = parseFloat(item.r_squared ?? 0);

                const history = Array.isArray(item.history)
                    ? item.history.map(value => parseFloat(value)).filter(value => !isNaN(value))
                    : [];

                const trend = item.trend || (predictedPrice >= currentPrice ? 'BULLISH' : 'BEARISH');

                rawData[symbol] = {
                    symbol,
                    current_price: currentPrice,
                    predicted_price: predictedPrice,
                    slope,
                    intercept,
                    r_squared: rSquared,
                    history,
                    trend
                };

                const color = trend === 'BULLISH' ? 'var(--bullish)' : 'var(--bearish)';

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><span class="badge">${symbol}</span></td>
                    <td>${currentPrice.toLocaleString()}</td>
                    <td style="color:${color}">${predictedPrice.toLocaleString()}</td>
                    <td style="color:${color}">${trend}</td>
                `;

                row.addEventListener('click', () => {
                    selector.value = symbol;
                    syncSelection();
                });

                tbody.appendChild(row);

                const option = document.createElement('option');
                option.value = symbol;
                option.textContent = symbol;
                selector.appendChild(option);
            });

            selector.selectedIndex = 0;
            syncSelection();

        } catch (error) {
            console.error('Prediction fetch error:', error);

            tbody.innerHTML = `
                <tr>
                    <td colspan="4" style="text-align:center; color: #ef4444; padding:20px;">
                        Failed to load data
                    </td>
                </tr>
            `;

            status.innerText = 'Backend unreachable';
        } finally {
            setTimeout(() => {
                bar.style.width = '0';
            }, 500);
        }
    }

    function syncSelection() {
        const selector = document.getElementById('indexSelector');
        const selectedSymbol = selector.value;
        const data = rawData[selectedSymbol];

        if (!data) return;

        // Always calculate fresh regression from history + predicted value
        const calculated = calculateRegression(data.history, data.predicted_price);

        if (calculated) {
            data.slope = calculated.slope;
            data.intercept = calculated.intercept;
            data.r_squared = calculated.r2;
            data.regression_line = calculated.predictedLine;
        } else {
            data.slope = 0;
            data.intercept = data.current_price;
            data.r_squared = 0;
            data.regression_line = [];
        }

        document.getElementById('mathDetails').innerHTML = `
            <div class="math-line"><span>Formula:</span><span>y = mx + c</span></div>
            <div class="math-line"><span>Slope (m):</span><span style="color:var(--accent-gold)">${data.slope.toFixed(4)}</span></div>
            <div class="math-line"><span>Intercept (c):</span><span style="color:var(--accent-gold)">${data.intercept.toFixed(2)}</span></div>
            <div class="math-line"><span>R² Score:</span><span style="color:var(--accent-gold)">${data.r_squared.toFixed(3)}</span></div>
            <div class="math-line"><span>Target:</span><span>${data.predicted_price.toFixed(2)}</span></div>
        `;

        renderChart(data);
    }

    function calculateRegression(history, predictedPrice = null) {
        try {
            if (!Array.isArray(history)) {
                console.warn('History is not an array');
                return null;
            }

            const cleanHistory = history
                .map(value => Number(value))
                .filter(value => !isNaN(value) && isFinite(value));

            if (predictedPrice !== null && !isNaN(predictedPrice)) {
                cleanHistory.push(Number(predictedPrice));
            }

            if (cleanHistory.length < 2) {
                console.warn('Not enough data for regression');
                return null;
            }

            const n = cleanHistory.length;
            const xValues = [];
            const yValues = cleanHistory;

            for (let i = 0; i < n; i++) {
                xValues.push(i);
            }

            const meanX = xValues.reduce((a, b) => a + b, 0) / n;
            const meanY = yValues.reduce((a, b) => a + b, 0) / n;

            let numerator = 0;
            let denominator = 0;

            for (let i = 0; i < n; i++) {
                numerator += (xValues[i] - meanX) * (yValues[i] - meanY);
                denominator += Math.pow(xValues[i] - meanX, 2);
            }

            if (denominator === 0) {
                return {
                    slope: 0,
                    intercept: meanY,
                    r2: 0,
                    predictedLine: yValues.map(() => meanY)
                };
            }

            const slope = numerator / denominator;
            const intercept = meanY - (slope * meanX);

            const predictedLine = xValues.map(x => (slope * x) + intercept);

            let ssResidual = 0;
            let ssTotal = 0;

            for (let i = 0; i < n; i++) {
                ssResidual += Math.pow(yValues[i] - predictedLine[i], 2);
                ssTotal += Math.pow(yValues[i] - meanY, 2);
            }

            let r2 = 0;

            if (ssTotal !== 0) {
                r2 = 1 - (ssResidual / ssTotal);
            }

            r2 = Math.max(0, Math.min(1, r2));

            return {
                slope: Number(slope.toFixed(4)),
                intercept: Number(intercept.toFixed(2)),
                r2: Number(r2.toFixed(4)),
                predictedLine
            };
        } catch (error) {
            console.error('Regression calculation failed:', error);
            return null;
        }
    }

    function renderChart(data) {
        const canvas = document.getElementById('mainChart');
        const ctx = canvas.getContext('2d');

        if (chartObj) {
            chartObj.destroy();
        }

        const history = data.history.length ? data.history : [data.current_price];

        const labels = history.map((_, index) => `P${index + 1}`);
        labels.push('Prediction');

        const historyData = [...history, null];

        const regressionData = data.regression_line && data.regression_line.length
            ? [...data.regression_line]
            : labels.map((_, index) => Number((data.slope * index) + data.intercept));

        const predictionPoint = new Array(history.length).fill(null);
        predictionPoint.push(data.predicted_price);

        chartObj = new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [
                    {
                        label: 'Price History',
                        data: historyData,
                        borderColor: '#38bdf8',
                        backgroundColor: 'rgba(56, 189, 248, 0.15)',
                        fill: true,
                        borderWidth: 2,
                        tension: 0.3,
                        pointRadius: 3
                    },
                    {
                        label: 'Regression Trend',
                        data: regressionData,
                        borderColor: '#facc15',
                        borderDash: [5, 5],
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: false
                    },
                    {
                        label: 'AI Prediction',
                        data: predictionPoint,
                        borderColor: '#ffffff',
                        backgroundColor: '#facc15',
                        pointRadius: 7,
                        pointHoverRadius: 10,
                        showLine: false
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false
                },
                plugins: {
                    legend: {
                        labels: {
                            color: '#94a3b8'
                        }
                    },
                    tooltip: {
                        enabled: true
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            color: '#94a3b8'
                        },
                        grid: {
                            color: 'rgba(255,255,255,0.05)'
                        }
                    },
                    y: {
                        ticks: {
                            color: '#94a3b8'
                        },
                        grid: {
                            color: 'rgba(255,255,255,0.05)'
                        },
                        beginAtZero: false
                    }
                }
            }
        });
    }
</script>

{% endblock %}
